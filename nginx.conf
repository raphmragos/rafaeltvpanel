worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 10000;
    reset_timedout_connection on;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 3600s;
    server_tokens off;
    client_max_body_size 100M;  # ✅ Dinagdag para malaki ang pwede ipadala

    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 3s;

    proxy_connect_timeout 10s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_socket_keepalive on;
    proxy_http_version 1.1;  # ✅ Inilipat sa pangkalahatan

    # Upgrade support para sa WebSocket at HTTP Upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==============================================
    # HTTP to HTTPS Redirect
    # ==============================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        # Health check
        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
            access_log off;
        }

        # I-redirect lahat sa HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==============================================
    # MAIN HTTPS SERVER (Port 443)
    # ==============================================
    server {
        listen 443 ssl http2 default_server backlog=4096;
        listen [::]:443 ssl http2 default_server backlog=4096;
        server_name _;  # ✅ Palitan ng domain mo kapag meron ka

        # ✅ SSL Configuration (palitan ang path ng certificate mo)
        ssl_certificate /etc/ssl/cert.pem;
        ssl_certificate_key /etc/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Root page (panel)
        location = / {
            root /usr/local/openresty/nginx/html;
            index index.html;
            access_log off;
        }

        # --------------------------
        # TROJAN
        # --------------------------
        # WebSocket
        location /rafaeltv {
            proxy_pass http://127.0.0.1:10000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # HTTP Upgrade
        location /rafaeltv-hu {
            proxy_pass http://127.0.0.1:10001;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # XHTTP ✅ Inayos para gumana nang tama
        location /rafaeltv-xh {
            proxy_pass http://127.0.0.1:10002;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # --------------------------
        # VMESS
        # --------------------------
        location /vmess-rafaeltv {
            proxy_pass http://127.0.0.1:10003;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /vmess-rafaeltv-hu {
            proxy_pass http://127.0.0.1:10004;
