<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAFAEL TV PANEL</title>
    <style>
        :root {
            --bg-main: #0f1223;
            --bg-dark: #171b2f;
            --surface: #1e2338;
            --surface-dark: #15192b;
            --border: #2d3250;
            --border-accent: #ff8a26;
            --text: #e6e9f8;
            --text-dim: #9498b8;
            --accent: #ff8a26;
            --glow: #ff9b47;
            --red: #ff4757;
            --yellow: #ffcc00;
            --blue: #4194ff;
            --green: #32e055;
            --font-sans: 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --font-size-base: clamp(13px, 3.2vw, 16px);
            --font-size-sm: clamp(11px, 2.7vw, 14px);
            --font-size-lg: clamp(18px, 4.5vw, 22px);
            --font-size-xl: clamp(28px, 8vw, 42px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0b0e1f 0%, #141830 100%);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: var(--font-size-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding: 20px 16px;
        }

        .container {
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 12px rgba(255, 138, 38, 0.3); }
            50% { box-shadow: 0 0 22px rgba(255, 138, 38, 0.6); }
        }

        .fade-in { animation: fadeInUp 0.6s ease-out forwards; }

        /* --- INFO GRID --- */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 10px;
        }

        .info-card {
            background: var(--surface-dark);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
        }

        .info-label {
            font-size: var(--font-size-sm);
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text);
            word-break: break-all;
        }

        /* --- SECTION BOX --- */
        .section {
            background: var(--surface-dark);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 20px;
            width: 100%;
        }

        .section-title {
            font-weight: 700;
            font-size: var(--font-size-lg);
            margin-bottom: 18px;
            letter-spacing: 0.8px;
            color: var(--text);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .icon {
            color: var(--accent);
        }

        /* --- DROPDOWN --- */
        .dropdown-wrapper { position: relative; width: 100%; margin-bottom: 12px; }

        .dropdown-btn {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 16px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-base);
            font-weight: 500;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .dropdown-btn:hover {
            border-color: var(--accent);
            background: rgba(255, 138, 38, 0.08);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border-accent);
            border-radius: 12px;
            padding: 8px 0;
            z-index: 100;
            max-height: 260px;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .dropdown-content.show { display: block; }

        .dropdown-item {
            padding: 14px 18px;
            cursor: pointer;
            font-size: var(--font-size-base);
            color: var(--text);
            transition: background 0.2s;
        }

        .dropdown-item:hover { background: rgba(255, 138, 38, 0.15); }
        .dropdown-item.selected { color: var(--accent); font-weight: bold; background: rgba(255, 138, 38, 0.1); }

        .hint-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-size-sm);
            color: var(--text-dim);
            padding: 6px 4px;
        }

        .hint-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--yellow);
            box-shadow: 0 0 8px var(--yellow);
            flex-shrink: 0;
        }

        /* --- BUTTONS --- */
        .button-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .btn {
            flex: 1 1 calc(50% - 6px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-base);
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .btn:hover {
            border-color: var(--accent);
            background: rgba(255, 138, 38, 0.12);
        }

        .btn.active {
            border-color: var(--accent);
            background: linear-gradient(145deg, #ff8a26, #ff9b47);
            color: #000000;
            font-weight: 700;
            box-shadow: 0 0 16px rgba(255, 138, 38, 0.5);
            animation: glowPulse 3s infinite;
        }

        /* --- CONFIG DISPLAY --- */
        .config-wrapper {
            position: relative;
            margin-top: 10px;
        }

        .config-display {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            padding-top: 48px;
            font-family: var(--font-mono);
            font-size: var(--font-size-sm);
            line-height: 1.7;
            word-break: break-all;
            white-space: pre-wrap;
            color: var(--green);
            min-height: 120px;
            max-height: 320px;
            overflow-y: auto;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            background: var(--surface-dark);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: var(--font-size-sm);
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            background: rgba(255, 138, 38, 0.25);
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 18, 35, 0.98);
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: var(--font-size-lg);
            color: var(--accent);
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loading-text">RAFAEL TV PANEL</div>
    <p style="color:var(--text-dim);">Initializing...</p>
</div>

<div class="container" id="main-content" style="display:none;">

    <!-- INFO GRID -->
    <div class="info-grid fade-in">
        <div class="info-card">
            <div class="info-label">HOST</div>
            <div class="info-value" id="info-host">rafael-tv.github.io</div>
        </div>
        <div class="info-card">
            <div class="info-label">IP ADDRESS</div>
            <div class="info-value" id="info-ip">34.96.47.181</div>
        </div>
        <div class="info-card">
            <div class="info-label">LOCATION</div>
            <div class="info-value" id="info-location">US.CENTRAL1</div>
        </div>
        <div class="info-card">
            <div class="info-label">UPTIME</div>
            <div class="info-value" id="runtime-display">00:00:14</div>
        </div>
        <div class="info-card">
            <div class="info-label">VISITORS</div>
            <div class="info-value">0</div>
        </div>
        <div class="info-card">
            <div class="info-label">ACTIVE</div>
            <div class="info-value">0</div>
        </div>
    </div>

    <!-- SERVER ADDRESS -->
    <div class="section fade-in">
        <h3 class="section-title">
            <span class="icon">🌐</span> SERVER ADDRESS
        </h3>
        <div class="dropdown-wrapper">
            <button class="dropdown-btn" id="address-dropdown-btn">firebase-settings.crashlytics.com ▾</button>
            <div class="dropdown-content" id="address-dropdown"></div>
        </div>
        <div class="hint-text">
            <span class="hint-dot"></span> Choose address to continue
        </div>
    </div>

    <!-- TLS SNI HOST -->
    <div class="section fade-in">
        <h3 class="section-title">
            <span class="icon">🔒</span> TLS SNI HOST
        </h3>
        <div class="dropdown-wrapper">
            <button class="dropdown-btn" id="sni-dropdown-btn">firebase-settings.crashlytics.com ▾</button>
            <div class="dropdown-content" id="sni-dropdown"></div>
        </div>
        <div class="hint-text">
            <span class="hint-dot"></span> Choose SNI for TLS security
        </div>
    </div>

    <!-- PROTOCOL TYPE -->
    <div class="section fade-in">
        <h3 class="section-title">
            <span class="icon">⚙️</span> PROTOCOL TYPE
        </h3>
        <div class="button-bar" id="protocol-bar"></div>
    </div>

    <!-- TRANSPORT TYPE -->
    <div class="section fade-in">
        <h3 class="section-title">
            <span class="icon">🚀</span> TRANSPORT TYPE
        </h3>
        <div class="button-bar" id="transport-bar"></div>
    </div>

    <!-- CONFIG DISPLAY -->
    <div class="section fade-in">
        <h3 class="section-title">
            <span class="icon">📋</span> GENERATED CONFIG
        </h3>
        <div class="config-wrapper">
            <button class="copy-btn" id="copy-btn">COPY</button>
            <div class="config-display" id="config-display">---</div>
        </div>
    </div>

</div>

<script>
(function() {
    const PASS = 'rafaeltv';
    let currentHost = 'rafael-tv.github.io';
    let currentIP = '34.96.47.181';
    let currentLocation = 'Us.central1';
    
    const PROTOCOLS = ['vless', 'trojan', 'vmess', 'shadowsocks'];
    const PROTOCOL_LABELS = { 
        vless: 'VLESS', 
        trojan: 'Trojan', 
        vmess: 'VMess', 
        shadowsocks: 'Shadowsocks' 
    };
    
    const TRANSPORTS = ['ws', 'hu', 'xh'];
    const TRANSPORT_LABELS = { 
        ws: 'WebSocket', 
        hu: 'HTTP Upgrade', 
        xh: 'XHTTP' 
    };

    const PATHS = { 
        vless: '/vless-rafaeltv', 
        trojan: '/rafaeltv', 
        vmess: '/vmess-rafaeltv', 
        shadowsocks: '/ss-rafaeltv' 
    };

    let selectedProtocol = 'vless';
    let selectedTransport = 'ws';
    let selectedAddress = 'firebase-settings.crashlytics.com';
    let selectedSNI = 'firebase-settings.crashlytics.com';

    let addressList = [
        'firebase-settings.crashlytics.com',
        'firebase.googleapis.com', 
        'google.com', 
        'payments.googleapis.com', 
        'run.googleapis.com',
        'www.gstatic.com',
        'dl.google.com',
        'connectivitycheck.gstatic.com'
    ];
    let sniList = [
        'firebase-settings.crashlytics.com',
        'fcmtoken.googleapis.com', 
        'api.paymaya.com', 
        'support.maya.ph', 
        's.ytimg.com',
        'fonts.googleapis.com',
        'ajax.googleapis.com'
    ];

    const infoHost = document.getElementById('info-host');
    const infoIP = document.getElementById('info-ip');
    const infoLocation = document.getElementById('info-location');
    const runtimeDisplay = document.getElementById('runtime-display');
    const addressDropdownBtn = document.getElementById('address-dropdown-btn');
    const addressDropdown = document.getElementById('address-dropdown');
    const sniDropdownBtn = document.getElementById('sni-dropdown-btn');
    const sniDropdown = document.getElementById('sni-dropdown');
    const protocolBar = document.getElementById('protocol-bar');
    const transportBar = document.getElementById('transport-bar');
    const configDisplay = document.getElementById('config-display');
    const copyBtn = document.getElementById('copy-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const mainContent = document.getElementById('main-content');

    function initPortal() {
        setupDropdown(addressDropdown, addressList, (val) => {
            selectedAddress = val;
            addressDropdownBtn.textContent = val + ' ▾';
            updateConfigDisplay();
        });
        setupDropdown(sniDropdown, sniList, (val) => {
            selectedSNI = val;
            sniDropdownBtn.textContent = val + ' ▾';
            updateConfigDisplay();
        });

        addressDropdownBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            addressDropdown.classList.toggle('show'); 
            sniDropdown.classList.remove('show'); 
        });
        sniDropdownBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            sniDropdown.classList.toggle('show'); 
            addressDropdown.classList.remove('show'); 
        });
        document.addEventListener('click', () => { 
            addressDropdown.classList.remove('show'); 
            sniDropdown.classList.remove('show'); 
        });

        setTimeout(() => {
            loadingScreen.classList.add('hidden');
            mainContent.style.display = 'flex';
        }, 1200);

        setInterval(updateRuntime, 1000);
        updateConfigDisplay();
    }

    function setupDropdown(element, items, callback) {
        element.innerHTML = '';
        items.forEach(item => {
            const dItem = document.createElement('div');
            dItem.className = 'dropdown-item';
            dItem.textContent = item;
            dItem.addEventListener('click', () => {
                element.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
                dItem.classList.add('selected');
                callback(item);
            });
            element.appendChild(dItem);
        });
    }

    function updateRuntime() {
        const diff = Math.floor(performance.now() / 1000);
        const hrs = String(Math.floor(diff / 3600)).padStart(2, '0');
        const mins = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
        const secs = String(diff % 60).padStart(2, '0');
        runtimeDisplay.textContent = hrs + ':' + mins + ':' + secs;
    }

    function getPath() {
        let path = PATHS[selectedProtocol];
        if (selectedTransport === 'hu') path += '-hu';
        else if (selectedTransport === 'xh') path += '-xh';
        return path;
    }

    function buildConfig() {
        const addr = selectedAddress;
        const sni = selectedSNI;
        const host = currentHost;
        const path = getPath();
        const netType = (selectedTransport === 'xh') ? 'xhttp' : (selectedTransport === 'hu' ? 'httpupgrade' : 'ws');
        const transportParam = (selectedTransport === 'ws') ? 'type=ws&path=' : 'type=http&path=';

        switch (selectedProtocol) {
            case 'vless':
                return 'vless://' + PASS + '@' + addr + ':443?encryption=none&flow=none&' + transportParam + encodeURIComponent(path) + '&host=' + host + '&security=tls&fp=chrome&sni=' + sni + '&alpn=http%2F1.1#VLESS-' + selectedTransport.toUpperCase() + '-' + host;
            case 'trojan':
                return 'trojan://' + PASS + '@' + addr + ':443?' + transportParam + encodeURIComponent(path) + '&host=' + host + '&security=tls&fp=chrome&sni=' + sni + '&alpn=http%2F1.1#TROJAN-' + selectedTransport.toUpperCase() + '-' + host;
            case 'vmess':
                return 'vmess://' + btoa(JSON.stringify({
                    v: '2',
                    ps: 'VMESS-' + selectedTransport.toUpperCase() + '-' + host,
                    add: addr,
                    port: '443',
                    id: PASS,
                    aid: '0',
                    scy: 'auto',
                    net: netType,
                    type: 'none',
                    host: host,
                    path: path,
                    tls: 'tls',
                    sni: sni,
                    fp: 'chrome',
                    alpn: 'http/1.1'
                }));
            case 'shadowsocks':
                return 'ss://' + btoa('aes-256-gcm:' + PASS) + '@' + addr + ':443#' + 'SS-' + selectedTransport.toUpperCase() + '-' + host;
        }
    }

    function updateConfigDisplay() {
        configDisplay.textContent = buildConfig();
    }

    function buildButtonBar(container, items, selected, labels, callback) {
        container.innerHTML = '';
        items.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            if (item === selected) btn.classList.add('active');
            btn.textContent = labels ? labels[item] : item;
            btn.addEventListener('click', () => {
                container.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                callback(item);
                updateConfigDisplay();
            });
            container.appendChild(btn);
        });
    }

    buildButtonBar(protocolBar, PROTOCOLS, selectedProtocol, PROTOCOL_LABELS, (val) => {
        selectedProtocol = val;
    });

    buildButtonBar(transportBar, TRANSPORTS, selectedTransport, TRANSPORT_LABELS, (val) => {
        selectedTransport = val;
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(configDisplay.textContent).then(() => {
            copyBtn.textContent = 'COPIED ✓';
            setTimeout(() => copyBtn.textContent = 'COPY', 2000);
        }).catch(() => {
            copyBtn.textContent = 'FAILED!';
            setTimeout(() => copyBtn.textContent = 'COPY', 2000);
        });
    });

    window.addEventListener('load', initPortal);
})();
</script>

</body>
</html>
